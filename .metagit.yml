name: metagit-cli
description: |
  Metagit is situational awareness for developers and agents. It can make a sprawling multi-repo project feel more like a monorepo or be used as a standalone tool to provide concise information on the project's used languages/frameworks, artifacts, upstream dependencies, and more.
kind: application
license:
  file: LICENSE
  kind: MIT
maintainers:
  - email: zloeber@gmail.com
    name: Zachary Loeber
    role: Contributor
artifacts:
  - definition: pyproject.toml
    location: dist/
    type: python_package
    version_strategy: semver
  - definition: Dockerfile
    location: .
    type: docker
    version_strategy: semver
branch_strategy: trunk
cicd:
  pipelines:
    - name: Lint and Test
      ref: .github/workflows/lint-and-test.yaml
    - name: Docs
      ref: .github/workflows/docs.yaml
    - name: PR and Push
      ref: .github/workflows/pr-and-push.yaml
    - name: Publish CLI
      ref: .github/workflows/publish-cli.yaml
  platform: GitHub

dependencies:
  - description:
      Ubuntu is a Linux distribution based on Debian and composed mostly
      of free and open-source software.
    kind: docker_image
    name: ubuntu_latest
    ref: ./.github/workflows/lint-and-test.yaml
  - name: python:3.12-slim
    kind: docker_image
    ref: ./Dockerfile
    url: https://hub.docker.com/_/python
observability:
  dashboards:
    - name: OpenSearch Dashboards
      tool: OpenSearch
      url: http://localhost:5601/
  logging_provider: elk
  monitoring_providers:
    - grafana
paths:
  - description: The main project path
    frameworks:
      - CrewAI
      - Click
    kind: application
    language: python
    language_version: "3.12"
    name: metagit
    package_manager: uv
    path: ./metagit
taskers:
  - kind: Taskfile
workspace:
  projects:
    - name: default
      description: |
        Default project for repositories that don't fit into other projects. Includes most IaC deployments.
      repos:
        - name: voip-infrastructure
          description: |
            VoIP infrastructure for the organization.
          url: git@gitlab.com:myorg/aws/voip-infrastructure.git
          branches: [main, france]
        - name: aws-account-infrastructure
          description: |
            AWS account infrastructure for the organization.
          url: git@gitlab.com:myorg/aws/aws-account-infrastructure.git
          branches: [main]
