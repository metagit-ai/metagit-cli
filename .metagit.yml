# yaml-language-server: $schema=https://raw.githubusercontent.com/metagit-ai/metagit-cli/refs/heads/main/schemas/metagit_config.schema.json
name: metagit-cli
description: |-
  Metagit is situational awareness for developers and agents. It can make
  a sprawling multi-repo project feel more like a monorepo or be used as a standalone
  tool to provide concise information on the project's used languages/frameworks,
  artifacts, upstream dependencies, and more.
kind: application
documentation:
  # Strings are allowed and will be treated as a markdown file in the root of the project
  - README.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  # URLs are allowed and will be treated as a web page.
  - https://metagit-ai.github.io/metagit-cli/
  # All of these are duplicates of the strings above, but they are here to demonstrate 
  # the different types of documentation that can be used.
  - kind: confluence
    url: https://confluence.example.com/display/METAGIT/Metagit+Documentation
    tags:
      playbook: 'true'
      tutorial: 'true'
  - kind: sharepoint
    url: https://sharepoint.example.com/display/METAGIT/Metagit+DevOps
    tags:
      devops: 'true'
  - kind: web
    url: https://hub.docker.com/_/python
    tags:
      docker: 'true'
      python: 'true'
license:
  kind: BSD-3-Clause
  file: LICENSE.md
maintainers:
  - name: Zachary Loeber
    email: zloeber@gmail.com
    role: Contributor
branch_strategy: trunk

taskers:
  - kind: Taskfile
artifacts:
  - type: python_package
    definition: pyproject.toml
    location: dist/
    version_strategy: semver
  - type: docker
    definition: Dockerfile
    location: .
    version_strategy: semver

cicd:
  platform: GitHub
  pipelines:
    - name: Lint and Test
      ref: .github/workflows/lint-and-test.yaml
      variables: []
    - name: Docs
      ref: .github/workflows/docs.yaml
      variables: []
    - name: PR and Push
      ref: .github/workflows/pr-and-push.yaml
      variables: []
    - name: Publish CLI
      ref: .github/workflows/publish-cli.yaml
      variables: []
observability: {}
  # dashboards:
  #   - name: OpenSearch Dashboards
  #     tool: OpenSearch
  #     url: http://localhost:5601/
  # logging_provider: elk
  # monitoring_providers:
  #   - grafana
paths:
  - name: metagit
    description: The main project path
    kind: application
    path: ./metagit
    language: python
    language_version: '3.13'
    package_manager: uv
    frameworks:
      - CrewAI
      - Click
    tags: {}
    protected: false
dependencies:
  - name: ubuntu_latest
    description: Ubuntu is a Linux distribution based on Debian and composed mostly of free and open-source software.
    kind: docker_image
    ref: ./.github/workflows/lint-and-test.yaml
    tags: {}
    protected: false
  - name: python:3.12-slim
    kind: docker_image
    ref: ./Dockerfile
    url: https://hub.docker.com/_/python
    tags: {}
    protected: false
workspace:
  projects: []
