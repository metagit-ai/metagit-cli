variables:
  github_org: metagit-ai
  github_repo: metagit-cli

providers:
  github:
    kind: github
    auth:
      kind: token
      config:
        token: ${METAGIT_GITHUB_TOKEN}

secrets:
  # ── Release token with write access to contents & PRs ──────────────
  - name: release_token
    kind: static
    config:
      default: ${PAT_TOKEN}
    targets:
      - provider: github
        kind: github_secret
        config:
          owner: ${github_org}
          repo: ${github_repo}
          secret_name: PAT_TOKEN

metadata:
  project: metagit-cli
  owner: metagit-ai
  description: PyPI API tokens for metagit-cli package publishing
  environments:
  - testpypi
  - production
