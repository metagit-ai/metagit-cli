name: Publish to PyPI, TestPyPI, and GitHub

on:
  push:
  workflow_dispatch:
  
env:
  PROJECT_NAME: metagit-cli

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Build package
        run: |
          uv build
      
      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  semantic-tag:
    name: Create semantic version tag
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version bump from commit prefixes
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
            range="HEAD"
          else
            range="${latest_tag}..HEAD"
          fi

          commit_text="$(git log "${range}" --pretty=%s%n%b)"
          bump="patch"

          if echo "${commit_text}" | grep -Eq 'BREAKING CHANGE|^[[:alpha:]]+(\([^)]+\))?!:'; then
            bump="major"
          elif echo "${commit_text}" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          fi

          current="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${current}"

          case "${bump}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: tag_check
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse "${{ steps.semver.outputs.next_tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.semver.outputs.next_tag }}"
          git push origin "${{ steps.semver.outputs.next_tag }}"
          echo "Created ${{ steps.semver.outputs.next_tag }} (${{ steps.semver.outputs.bump }})"

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs: build
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
    environment:
      name: production
      url: https://pypi.org/p/${{ env.PROJECT_NAME }}
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs:
    - build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # only publish to TestPyPI on tag pushes

    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ env.PROJECT_NAME }}

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  create-release:
    name: Create Release - ${{ github.ref_name }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: publish-to-pypi
    if: github.ref_type == 'tag' # only publish release to GitHub on tag pushes
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          make_latest: true
          generate_release_notes: true

