# Repomix glob patterns are relative to each managed repository root (--include / --ignore comma lists).
profiles:
  bugfix-local:
    include:
      - src/**
      - tests/**
      - pyproject.toml
      - schemas/**
    exclude:
      - "**/__pycache__/**"

  config-edit:
    include:
      - .metagit.yml
      - metagit.config.yaml
      - schemas/**
    exclude:
      - "**/__pycache__/**"

  cross-repo-impact:
    include:
      - .metagit.yml
      - schemas/**
      - docs/reference/**
    exclude:
      - "**/__pycache__/**"

  rewrite-source:
    include:
      - src/**
      - tests/**
      - schemas/**
      - docs/reference/**
    exclude:
      - "**/__pycache__/**"

  rewrite-target:
    include:
      - src/**
      - tests/**
      - crates/**
    exclude:
      - "**/__pycache__/**"
      - "**/target/**"
