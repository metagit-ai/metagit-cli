# Modality parity registry — master table of user-facing features and surfaces.
# Validated by scripts/check_modality_parity.py (task qa:prepush).
# Human table: docs/reference/modality-feature-registry.md (task generate:modality-registry).

version: 1

features:
  - id: atlas_local
    description: Repository-local Atlas semantic layer (init/generate/validate/query)
    service: metagit.core.atlas.service.AtlasService
    reference_doc: docs/reference/atlas.md
    surfaces:
      cli:
        markers:
          - path: src/metagit/cli/commands/atlas.py
            contains: '@atlas_group.command("generate")'
          - path: src/metagit/cli/main.py
            contains: atlas_group
      documentation:
        markers:
          - path: docs/reference/atlas.md
            contains: "modality:atlas_local"
          - path: docs/agents.md
            contains: "modality:atlas_local"

  - id: provider_source_sync_imperative
    description: Imperative provider discovery and manifest apply
    service: metagit.core.project.source_sync_runner.run_source_sync
    reference_doc: docs/cli_reference.md
    surfaces:
      cli:
        markers:
          - path: src/metagit/cli/commands/project_source.py
            contains: run_source_sync
      mcp:
        markers:
          - path: src/metagit/core/mcp/tool_registry.py
            contains: metagit_project_source_sync
          - path: src/metagit/core/mcp/services/source_sync.py
            contains: run_source_sync

  - id: provider_source_sync_manifest
    description: Declarative sync from workspace.projects[].sources[]
    service: metagit.core.project.source_manifest_sync.SourceManifestSyncService
    reference_doc: docs/cli_reference.md
    surfaces:
      cli:
        markers:
          - path: src/metagit/cli/commands/project_source.py
            contains: from_manifest
      mcp:
        markers:
          - path: src/metagit/core/mcp/services/source_sync.py
            contains: from_manifest
      web:
        markers:
          - path: src/metagit/core/web/ops_handler.py
            contains: /v3/ops/source-sync

  - id: source_sync_reconcile_approval
    description: Apply approved reconcile removals to the manifest
